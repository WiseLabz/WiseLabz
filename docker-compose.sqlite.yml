# WiseLabz — SQLite single-container reference stack
#
# Single-container deployment for evaluation / single-user homelab use.
# Uses the app's built-in SQLite default (file:/data/wiselabz.db) backed by
# a named Docker volume, so no separate database service is required.
#
# This stack is APP-ONLY: there is no bundled reverse proxy or TLS
# termination. Put Traefik, Caddy, nginx, or similar in front of the `app`
# service's published port (8080). The WebSocket endpoint (/api/ws) shares
# the same port/service as the rest of the HTTP API — a reverse proxy
# forwarding normal HTTP traffic here just needs Upgrade/Connection header
# passthrough enabled for that path, no extra config in this compose file.
#
# Quick start:
#   1. cp .env.example .env
#   2. edit .env (set WISELABZ_AUTH_SECRET and WISELABZ_ADMIN_PASSWORD)
#   3. docker compose -f docker-compose.sqlite.yml up -d

services:
  app:
    build: .
    # Alternative: use the published image instead of building locally.
    # image: ghcr.io/wiselabz/wiselabz:latest
    env_file:
      - .env
    # No WISELABZ_DB_DRIVER / WISELABZ_DB_DSN overrides needed here — the
    # app already defaults to driver "sqlite" with DSN
    # "file:/data/wiselabz.db?cache=shared", which matches the /data volume
    # mounted below. Uncomment below only if you want to override them
    # (e.g. a different file name or sqlite pragma string):
    # environment:
    #   WISELABZ_DB_DRIVER: sqlite
    #   WISELABZ_DB_DSN: "file:/data/wiselabz.db?cache=shared"
    ports:
      - "8080:8080"
    volumes:
      # Named volume holding the sqlite database file. Use a bind mount
      # instead (e.g. "./data:/data") if you want the db file directly
      # accessible on the host filesystem.
      - wiselabz_data:/data
    healthcheck:
      test: ["CMD", "/wiselabz", "--healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  wiselabz_data:
